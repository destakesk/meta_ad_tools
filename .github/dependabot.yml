version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '03:00'
    open-pull-requests-limit: 10
    groups:
      nestjs:
        patterns: ['@nestjs/*']
      next:
        patterns: ['next', 'react', 'react-dom', '@next/*']
      tanstack:
        patterns: ['@tanstack/*']
      types:
        patterns: ['@types/*']
      eslint:
        patterns: ['eslint*', '@typescript-eslint/*', 'typescript-eslint']
      sentry:
        patterns: ['@sentry/*']
      prisma:
        patterns: ['prisma', '@prisma/*']
    commit-message:
      prefix: 'chore(deps)'
      include: scope
    labels:
      - dependencies
      - automated

  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
    commit-message:
      prefix: 'chore(deps)'
      include: scope

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
    commit-message:
      prefix: 'chore(deps)'
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: 'ci'
      include: scope
