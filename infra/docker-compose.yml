# Local development services only. apps/api and apps/web run on the host via
# `pnpm dev` so hot reload and IDE debugging keep working.
services:
  postgres:
    image: postgres:16-alpine
    container_name: metaflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: metaflow
      POSTGRES_PASSWORD: metaflow_dev
      POSTGRES_DB: metaflow_dev
      POSTGRES_INITDB_ARGS: --data-checksums
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U metaflow -d metaflow_dev']
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [metaflow]

  redis:
    image: redis:7-alpine
    container_name: metaflow-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [metaflow]

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: metaflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [metaflow]

  minio-setup:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: metaflow-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/metaflow-dev &&
        echo 'bucket metaflow-dev ready'
      "
    networks: [metaflow]

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  metaflow:
    driver: bridge
