user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Buffers sized for normal JSON payloads; creative uploads should be
    # routed via a signed S3 URL rather than proxied.
    client_max_body_size 10m;
    keepalive_timeout 65;
    sendfile on;
    server_tokens off;

    gzip on;
    gzip_types application/json application/javascript text/css text/html text/plain;

    # Rate limiting zone (10 req/s per IP, 20-req burst).
    limit_req_zone $binary_remote_addr zone=metaflow_rl:10m rate=10r/s;

    upstream web {
        server web:3000;
    }

    upstream api {
        server api:3001;
    }

    server {
        listen 80 default_server;
        server_name _;

        # Security headers — CSP is set by Next middleware; the remainder are
        # defense in depth.
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "DENY" always;

        location /api/ {
            limit_req zone=metaflow_rl burst=20 nodelay;
            proxy_pass http://api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
